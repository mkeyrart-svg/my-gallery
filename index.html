<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세 장의 그림</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --bg: #f5f0e8;
    --ink: #1a1410;
    --muted: #8a7d6e;
    --accent: #c4603a;
    --paper: #faf7f2;
    --border: #d4c9b8;
    --selected-glow: rgba(196, 96, 58, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 3.5rem 2rem 2rem;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 1.5rem auto 0;
  }

  .site-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1.2;
  }

  .site-sub {
    margin-top: 0.6rem;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    font-weight: 300;
    text-transform: uppercase;
  }

  /* ── INSTRUCTION ── */
  .instruction {
    text-align: center;
    padding: 1.8rem 2rem 0.5rem;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.8;
  }

  .step-counter {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.35rem 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  /* ── GALLERY ── */
  .gallery-section {
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 2rem;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.2rem;
  }

  .img-card {
    position: relative;
    aspect-ratio: 1/1;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--paper);
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .img-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(26,20,16,0.12);
  }

  .img-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent), 0 8px 24px var(--selected-glow);
  }

  .img-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }

  .img-card .empty-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    color: var(--border);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .img-card .empty-placeholder svg {
    width: 28px;
    height: 28px;
    opacity: 0.4;
  }

  /* order badge */
  .order-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 26px;
    height: 26px;
    background: var(--accent);
    color: white;
    font-size: 0.75rem;
    font-family: 'Cormorant Garamond', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .img-card.selected .order-badge {
    opacity: 1;
    transform: scale(1);
  }

  /* upload icon overlay for admin */
  .img-card .upload-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,20,16,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
  }

  .img-card:hover .upload-overlay {
    opacity: 1;
  }

  .img-card .upload-overlay span {
    color: white;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* hidden file input */
  .file-input { display: none; }

  /* ── SELECTION STRIP ── */
  .selection-strip {
    max-width: 900px;
    margin: 1.5rem auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .selected-preview {
    display: flex;
    gap: 0.6rem;
    flex: 1;
  }

  .sel-thumb {
    width: 60px;
    height: 60px;
    border: 1px solid var(--border);
    background: var(--paper);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .sel-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .sel-thumb .num {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    text-align: center;
    padding: 1px 0;
    font-family: 'Cormorant Garamond', serif;
  }

  .sel-thumb.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 1rem;
  }

  .generate-btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 0.9rem 2rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--accent);
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.9rem 1.2rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .reset-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* ── STORY OUTPUT ── */
  .story-section {
    max-width: 680px;
    margin: 2rem auto 5rem;
    padding: 0 2rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .story-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .story-card {
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 3rem 3.5rem;
    position: relative;
  }

  .story-card::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 8px;
    right: -8px;
    bottom: -8px;
    border: 1px solid var(--border);
    z-index: -1;
  }

  .story-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .story-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .story-text {
    font-size: 1rem;
    line-height: 2;
    color: var(--ink);
    font-weight: 300;
    white-space: pre-wrap;
  }

  .story-text .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .story-selected-imgs {
    display: flex;
    gap: 0.5rem;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .story-selected-imgs img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border: 1px solid var(--border);
    opacity: 0.7;
  }

  /* loading dots */
  .loading-indicator {
    display: none;
    justify-content: center;
    gap: 6px;
    padding: 2rem;
  }

  .loading-indicator.active { display: flex; }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-10px); opacity: 1; }
  }

  /* ── ADMIN MODE TOGGLE ── */
  .admin-bar {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: flex-end;
    z-index: 100;
  }

  .admin-toggle {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 0.5rem 1rem;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .admin-toggle:hover { opacity: 1; }

  .admin-panel {
    display: none;
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 1.2rem;
    font-size: 0.78rem;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.8;
  }

  .admin-panel.open { display: block; }

  .admin-panel input, .admin-panel textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.5rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.78rem;
    color: var(--ink);
    margin-top: 0.4rem;
    margin-bottom: 0.8rem;
    resize: vertical;
  }

  .admin-panel label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 0.6rem;
  }

  .admin-save {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    width: 100%;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
    .story-card { padding: 2rem 1.8rem; }
    .selection-strip { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <p class="site-title">세 장의 그림</p>
  <p class="site-sub">Three Pictures · One Story</p>
</header>

<div class="instruction">
  <div>
    <span class="step-counter">순서대로 세 장을 골라주세요</span>
  </div>
  그림을 선택한 순서가 이야기의 흐름이 됩니다
</div>

<!-- GALLERY -->
<section class="gallery-section">
  <div class="gallery-grid" id="galleryGrid">
    <!-- cards injected by JS -->
  </div>
</section>

<!-- SELECTION STRIP -->
<div class="selection-strip">
  <div class="selected-preview" id="selectedPreview">
    <div class="sel-thumb empty" id="thumb0">·</div>
    <div class="sel-thumb empty" id="thumb1">·</div>
    <div class="sel-thumb empty" id="thumb2">·</div>
  </div>
  <button class="reset-btn" onclick="resetSelection()">초기화</button>
  <button class="generate-btn" id="generateBtn" onclick="generateStory()" disabled>
    이야기 만들기 →
  </button>
</div>

<!-- LOADING -->
<div class="loading-indicator" id="loadingIndicator">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>

<!-- STORY OUTPUT -->
<section class="story-section" id="storySection">
  <div class="story-card" id="storyCard">
    <div class="story-label">이야기</div>
    <div class="story-text" id="storyText"></div>
    <div class="story-selected-imgs" id="storyImgs"></div>
  </div>
</section>

<!-- ADMIN BAR -->
<div class="admin-bar">
  <div class="admin-panel" id="adminPanel">
    <strong style="color:var(--ink); font-size:0.8rem;">관리자 설정</strong><br>
    <small>모든 설정은 이 브라우저에 저장됩니다</small>

    <label>Anthropic API 키</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />

    <label>특별한 조합 (예: 2,5,7)</label>
    <input type="text" id="specialCombo" placeholder="그림 번호 3개, 쉼표로 구분" />

    <label>직접 쓴 이야기</label>
    <textarea id="specialStory" rows="6" placeholder="여기에 직접 쓴 이야기를 입력하세요..."></textarea>

    <button class="admin-save" onclick="saveSpecial()">저장</button>
  </div>
  <button class="admin-toggle" onclick="toggleAdmin()">관리자</button>
</div>

<script>
// ════════════════════════════════
//  STATE
// ════════════════════════════════

// 이미지는 images/ 폴더에서 바로 불러옵니다
const imageSrcs = {};
for (let i = 1; i <= 9; i++) {
  imageSrcs[i] = `${i}.jpg`;
}

const IMAGES = Array.from({length:9}, (_,i) => ({ id: i+1 }));
let selected = [];

// 특별 조합 & 이야기
let SPECIAL_COMBO = [1, 3, 7]; // ← 원하는 조합으로 변경
let SPECIAL_STORY =
`옛날 옛날, 작은 마을 어귀에 이상한 문이 하나 있었습니다.

문은 아무도 열지 않았는데도 가끔 혼자 삐걱거렸고, 그 소리를 들은 아이들은 서로 귓속말로 속삭였습니다.

"저 문 너머엔 우리가 잃어버린 것들이 모여 산대."

어느 날 저녁, 용기 있는 아이 하나가 조심스럽게 손잡이를 잡았습니다. 차갑고 낡은 쇠 느낌. 그런데 손잡이가 먼저 아이의 손을 꼭 쥐었습니다.

문은 소리 없이 열렸고, 그 안에는 — 어린 시절 잃어버린 빨간 양말 한 짝, 누군가의 첫 편지, 그리고 아직 불리지 못한 노래 하나가 빛처럼 둥둥 떠 있었습니다.

아이는 아무것도 가져가지 않았습니다. 그저 오래 바라보다가, 문을 부드럽게 닫았습니다.

그리고 집으로 돌아가 처음으로, 오래된 일기장을 펼쳤습니다.`;

// API 키 — 관리자 패널에서 입력
let API_KEY = '';

// ════════════════════════════════
//  GALLERY
// ════════════════════════════════
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  IMAGES.forEach(img => {
    const card = document.createElement('div');
    card.className = 'img-card' + (selected.includes(img.id) ? ' selected' : '');
    card.dataset.id = img.id;

    const badge = document.createElement('div');
    badge.className = 'order-badge';
    const idx = selected.indexOf(img.id);
    if (idx !== -1) badge.textContent = idx + 1;

    const imgEl = document.createElement('img');
    imgEl.src = imageSrcs[img.id];
    imgEl.alt = `그림 ${img.id}`;
    card.appendChild(imgEl);

    card.appendChild(badge);
    card.onclick = () => handleCardClick(img.id);
    grid.appendChild(card);
  });
}

function handleFileUpload() {} // 미사용

// ════════════════════════════════
//  SELECTION
// ════════════════════════════════
function handleCardClick(id) {
  if (selected.includes(id)) {
    selected = selected.filter(s => s !== id);
  } else {
    if (selected.length >= 3) return;
    selected.push(id);
  }
  renderGallery();
  updateSelectionPreview();
  updateGenerateBtn();
}

function updateSelectionPreview() {
  for (let i = 0; i < 3; i++) {
    const thumb = document.getElementById('thumb'+i);
    const id = selected[i];
    if (id && imageSrcs[id]) {
      thumb.className = 'sel-thumb';
      thumb.innerHTML = `<img src="${imageSrcs[id]}" alt=""><div class="num">${i+1}</div>`;
    } else {
      thumb.className = 'sel-thumb empty';
      thumb.textContent = '·';
    }
  }
}

function updateGenerateBtn() {
  document.getElementById('generateBtn').disabled = selected.length < 3;
}

function resetSelection() {
  selected = [];
  renderGallery();
  updateSelectionPreview();
  updateGenerateBtn();
  document.getElementById('storySection').classList.remove('visible');
}

// ════════════════════════════════
//  STORY GENERATION
// ════════════════════════════════
async function generateStory() {
  if (selected.length < 3) return;

  if (!API_KEY) {
    const key = prompt('Anthropic API 키를 입력해 주세요.\n(관리자 패널에서 저장하면 다음부터 자동입력)');
    if (!key) return;
    API_KEY = key.trim();
  }

  const isSpecial = JSON.stringify(selected) === JSON.stringify(SPECIAL_COMBO);
  document.getElementById('loadingIndicator').classList.add('active');
  document.getElementById('storySection').classList.remove('visible');
  document.getElementById('storyText').textContent = '';

  const imgSrcList = selected.map(id => imageSrcs[id]);
  document.getElementById('storyImgs').innerHTML = imgSrcList.map(src => `<img src="${src}" alt="">`).join('');

  if (isSpecial) {
    document.getElementById('loadingIndicator').classList.remove('active');
    document.getElementById('storySection').classList.add('visible');
    await typewriterEffect(SPECIAL_STORY);
    return;
  }

  try {
    // 이미지 URL → base64 변환
    const imgBlocks = await Promise.all(imgSrcList.map(async src => {
      const res = await fetch(src);
      const blob = await res.blob();
      const base64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
      return { type: 'image', source: { type: 'base64', media_type: blob.type || 'image/jpeg', data: base64 }};
    }));

    const content = [
      { type: 'text', text: '다음 세 장의 그림을 순서대로 봐주세요.' },
      ...imgBlocks,
      { type: 'text', text: '위 세 장의 그림을 첫 번째 → 두 번째 → 세 번째 순서로 이어지는 짧고 아름다운 동화를 한국어로 써주세요. 300~500자, 따뜻하고 은유적인 문체, 이야기 본문만 출력하세요.' }
    ];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1000,
        system: '당신은 섬세하고 시적인 동화 작가입니다. 이야기 본문만 출력하세요.',
        messages: [{ role: 'user', content }]
      })
    });

    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '이야기를 불러오지 못했습니다.';
    document.getElementById('loadingIndicator').classList.remove('active');
    document.getElementById('storySection').classList.add('visible');
    await typewriterEffect(text);
  } catch(err) {
    document.getElementById('loadingIndicator').classList.remove('active');
    document.getElementById('storySection').classList.add('visible');
    await typewriterEffect('이야기를 만드는 중 오류가 발생했습니다.\n잠시 후 다시 시도해 주세요.');
  }
}

async function typewriterEffect(text) {
  const el = document.getElementById('storyText');
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  for (let i = 0; i < text.length; i++) {
    cursor.insertAdjacentText('beforebegin', text[i]);
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    await sleep(text[i] === '\n' ? 55 : 20);
  }
  cursor.remove();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ════════════════════════════════
//  ADMIN PANEL
// ════════════════════════════════
function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('specialCombo').value = SPECIAL_COMBO.join(',');
    document.getElementById('specialStory').value = SPECIAL_STORY;
    document.getElementById('apiKeyInput').value = API_KEY;
  }
}

function saveSpecial() {
  const comboVal = document.getElementById('specialCombo').value;
  const storyVal = document.getElementById('specialStory').value;
  const keyVal   = document.getElementById('apiKeyInput').value.trim();
  const nums = comboVal.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
  if (nums.length !== 3) { alert('그림 번호 3개를 쉼표로 입력해 주세요 (예: 2,5,7)'); return; }
  SPECIAL_COMBO = nums;
  SPECIAL_STORY = storyVal;
  if (keyVal) { API_KEY = keyVal; }
  document.getElementById('adminPanel').classList.remove('open');
  alert(`저장 완료! 특별 조합: 그림 ${nums.join(' → ')}`);
}

//  INIT
// ════════════════════════════════
renderGallery();
</script>
